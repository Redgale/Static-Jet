<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <!-- Apple rounds the corners itself, so fill full square -->
  <defs>
    <radialGradient id="bgApple" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a12"/>
    </radialGradient>
  </defs>

  <rect width="180" height="180" fill="url(#bgApple)"/>

  <!-- Left wing -->
  <path d="M139,33 L25,131 L82,101 Z" fill="#e94560"/>
  <!-- Right wing / body -->
  <path d="M139,33 L110,153 L82,101 Z" fill="#b02040"/>
  <!-- Fold -->
  <path d="M139,33 L82,101" stroke="#ff6080" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <!-- Tail -->
  <path d="M82,101 L68,125 L77,98 Z" fill="#ff7090"/>

  <!-- Contrail -->
  <line x1="50" y1="138" x2="35" y2="151" stroke="#e94560" stroke-width="2"
        stroke-linecap="round" opacity="0.35"/>
  <line x1="41" y1="141" x2="28" y2="152" stroke="#e94560" stroke-width="1.5"
        stroke-linecap="round" opacity="0.18"/>
</svg>
